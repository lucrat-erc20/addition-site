name: Sync Blog Posts

on:
  schedule:
    - cron: '0 * * * *'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout addition-site
        uses: actions/checkout@v4.2.2
        with:
          token: ${{ secrets.ADDITION_SITE_TOKEN }}

      - name: Checkout Bux-Blog (private)
        uses: actions/checkout@v4.2.2
        with:
          repository: lucrat-erc20/Bux-Blog
          token: ${{ secrets.BLOG_CONTENT_TOKEN }}
          path: bux-blog-source

      - name: Copy blog posts to content/blog
        run: |
          mkdir -p content/blog
          for file in bux-blog-source/blog/*.md; do
            [ -f "$file" ] || continue
            filename=$(basename "$file")

            # Skip INDEX.md and any non-post files
            [ "$filename" = "INDEX.md" ] && continue

            # Skip files that don't start with a date prefix
            [[ ! "$filename" =~ ^[0-9]{4}-[0-9]{2}-[0-9]{2}- ]] && continue

            # Strip leading date prefix (e.g. 2026-04-01-) to get clean slug filename
            slug=$(echo "$filename" | sed 's/^[0-9]\{4\}-[0-9]\{2\}-[0-9]\{2\}-//')

            dest="content/blog/${slug}"
            if [ ! -f "$dest" ]; then
              cp "$file" "$dest"
              echo "Copied: $filename → $slug"
            fi
          done

      - name: Commit and push if new posts found
        run: |
          git config user.name "Blog Sync Bot"
          git config user.email "bot@addition.site"
          git add content/blog/
          if git diff --staged --quiet; then
            echo "No new posts to sync"
          else
            git commit -m "blog: sync new posts from Bux-Blog"
            git push
          fi